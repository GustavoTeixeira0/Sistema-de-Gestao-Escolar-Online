    <!-- CARD FALTAS -->
    <div class="card">

      <div class="title">
        <h2>Faltas dos alunos:</h2>
        <i class="bi bi-journal-check icon-title"></i>
      </div>

      <div id="faltasConfig" class="actions hidden" style="gap:10px; flex-wrap: wrap;">
        <input id="selectedAlunoCpf" type="text" placeholder="Nome ou CPF do aluno (opcional)" maxlength="50"
          style="width:250px;">
        <button type="button" onclick="renderFaltasAluno()">Atualizar lista de alunos</button>
      </div>

      <div id="faltasForm" class="actions hidden" style="gap:10px; flex-wrap: wrap; margin-top: 20px;">
        <input id="faltaData" type="date" style="width:170px; padding: 12px 16px; border-radius: 12px; background: #00666b; color: #00ffff; border: none; outline: none;" />
        <select id="faltaBimestre" style="width:140px; padding: 12px 16px; border-radius: 12px; background: #00666b; color: #00ffff; border: none; outline: none;">
          <option value="1">Bimestre 1</option>
          <option value="2">Bimestre 2</option>
          <option value="3">Bimestre 3</option>
          <option value="4">Bimestre 4</option>
        </select>
        <label class="checkbox-wrapper">
          <input id="faltaPresenca" type="checkbox" />
          Presença geral
        </label>
        <button type="button" onclick="salvarFaltasEmLote()">Registrar chamada</button>
      </div>

      <div id="faltasBulkContainer" class="bulk-attendance hidden" style="margin-top: 20px;"></div>

      <div id="listaAlunosModal" class="modal hidden">
        <div class="modal-content">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #00e5ff; margin: 0;">Alunos da escola</h3>
            <button type="button" onclick="fecharListaAlunos()"
              style="background: none; border: none; color: #00e5ff; font-size: 24px; cursor: pointer;">&times;</button>
          </div>
          <div id="listaAlunosContainer" style="max-height: 400px; overflow-y: auto; margin-top: 20px;"></div>
        </div>
      </div>

      <div id="msgFaltas" class="msg"></div>

      <div id="faltasContainer"></div>

    </div>
