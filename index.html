<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Login e Cadastro</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">#</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<br>
  <div class="container">
    <div class="card" style="width:500px; min-height:700px;">
      <div class="title">
        <h1>Login</h1>
      </div>

      <div class="input-group">
        <input type="text" id="loginCpf" placeholder="CPF">
        <span class="icon"><i class="bi bi-person"></i></span>
      </div>

      <div class="input-group">
        <input type="password" id="loginSenha" placeholder="Senha">
        <span class="icon"><i class="bi bi-key"></i></span>
      </div>

      <div class="input-group">
        <input type="text" id="loginEscola" placeholder="Escola">
        <span class="icon"><i class="bi bi-building"></i></span>
      </div>

      <div class="link">
        <a href="#">esqueci minha senha</a>
      </div>

      <div class="actions">
        <button onclick="fazerLogin()">FAZER LOGIN</button>
      </div>

      <div class="msg" id="msgLogin"></div>
    </div>

    <div class="card" style="width:500px; min-height:700px;">
      <div class="title">
        <h1>Cadastro</h1>
      </div>

      <div class="input-group">
        <input type="text" id="cadCpf" placeholder="CPF">
        <span class="icon"><i class="bi bi-person"></i></span>
      </div>

      <div class="input-group">
        <input type="password" id="cadSenha" placeholder="Senha">
        <span class="icon"><i class="bi bi-key"></i></span>
      </div>

      <div class="input-group">
        <input type="text" id="cadEscola" placeholder="Escola">
        <span class="icon"><i class="bi bi-building"></i></span>
      </div>

      <div class="input-group">
        <select id="cadTipo">
          <option value="">Tipo de conta</option>
          <option value="Aluno">Aluno</option>
          <option value="Professor">Professor</option>
          <option value="Administrador">Administrador</option>
        </select>
      </div>

      <div class="actions">
        <button onclick="cadastrar()">SOLICITAR INSCRIÇÃO</button>
      </div>

      <div class="link">
        <a href="Cadastro_Escola.html">inscreva sua instituição aqui</a>
      </div>

      <div class="msg" id="msgCadastro"></div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script src="script.js"></script>
</body>
</html>
